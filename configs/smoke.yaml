inherits: configs/default.yaml

data:
  max_examples: 8
  max_source_length: 32
  max_target_length: 32
  validation_size: 0.0
  test_size: 0.0

training:
  output_dir: models/eat_bart_smoke
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  max_steps: 1
  fp16: false
  eval_strategy: "no"
  save_strategy: "no"
  logging_steps: 1
  save_model: false
