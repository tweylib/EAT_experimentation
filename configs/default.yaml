model:
  name: facebook/bart-base
  local_files_only: true
  emotion_dim: 8
  emotion_hidden_dim: 32
  alpha_init: 0.05
  attention_formula: additive
  modify_encoder_self_attention: true
  modify_decoder_self_attention: true
  modify_cross_attention: false

data:
  dataset_path: data/processed/finalMentalHealthDataset-question-response.csv
  question_column: question
  response_column: response
  validation_size: 0.1
  test_size: 0.1
  nrc_lexicon_path: data/raw/nrc_lexicon.csv
  max_source_length: 256
  max_target_length: 128
  subword_strategy: single
  max_examples:

training:
  output_dir: models/eat_bart
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.00003
  num_train_epochs: 3
  max_steps: -1
  fp16: true
  seed: 42
  eval_strategy: epoch
  save_strategy: epoch
  logging_steps: 50
  save_total_limit: 2
  predict_with_generate: false
  report_to: none
  optim: adamw_torch
  dataloader_num_workers: 0
  dataloader_pin_memory: false
  require_cuda: false
  save_model: true
